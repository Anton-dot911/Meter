[project]
name = "meter"
version = "0.0.0"
description = "Meter — fire-and-forget cost/latency tracking wrapper around the Anthropic SDK (Python). Installed via VCS URL."
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = ["pytest>=8"]

[tool.pytest.ini_options]
markers = [
    "llm: smoke tests that hit the real Anthropic API (run manually)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["meter"]
