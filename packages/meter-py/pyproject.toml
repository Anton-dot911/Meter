[project]
name = "meter"
version = "0.0.0"
description = "Meter — fire-and-forget cost/latency tracking wrapper around the Anthropic SDK (Python). Installed via VCS URL."
requires-python = ">=3.11"
# Keep deps minimal (Hard Rule 7): only the supabase client. The Anthropic SDK
# is a host-owned dependency (mirrors meter-ts's peerDependency) — the wrapper
# duck-types the client and never imports anthropic at runtime — so it lives in
# the dev group alongside pytest.
dependencies = ["supabase>=2"]

[dependency-groups]
dev = ["pytest>=8", "anthropic>=0.40"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "llm: smoke tests that hit the real Anthropic API (run manually)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["meter"]

# Ship the shared price table as package data so a git-dependency install (whose
# wheel contains only the `meter` package, not the repo-root spec/) can price
# calls. The single committed source stays spec/prices.json; this is a
# build-time copy into the wheel, loaded via importlib.resources at runtime.
[tool.hatch.build.targets.wheel.force-include]
"../../spec/prices.json" = "meter/prices.json"
